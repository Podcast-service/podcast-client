server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Проксирование API на бэкенд castapp.ru ──
    # Те же префиксы, что и dev-прокси Vite (auth / podcast/v1 / api media|tts).
    # Без этих блоков POST /auth/* проваливается в SPA-фолбэк ниже и nginx
    # отдаёт 405 (POST к статическому index.html недопустим).
    # Резолвер нужен, чтобы DNS-имя backend'а перечитывалось в рантайме.
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    set $backend "castapp.ru";

    location /auth/ {
        proxy_pass https://$backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $backend;
        # castapp.ru пускает по CORS только свой origin; убираем Origin,
        # чтобы бэкенд отдавал ответ без CORS-проверки (как в dev-прокси).
        proxy_set_header Origin "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /podcast/v1/ {
        proxy_pass https://$backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $backend;
        proxy_set_header Origin "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/media/ {
        proxy_pass https://$backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $backend;
        proxy_set_header Origin "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/tts/ {
        proxy_pass https://$backend;
        proxy_ssl_server_name on;
        proxy_set_header Host $backend;
        proxy_set_header Origin "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Все роуты отдаём index.html (для React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Кэширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
